name: Deploy Spring Boot to Azure VM

on:
  push:
    branches: ["develop"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Installer Java
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Build Spring Boot
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4. Créer dossier sur VM + envoyer le JAR
      - name: Copy JAR to Azure VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_IP }}
          username: NekasoVM
          key: ${{ secrets.VM_SSH_KEY }}
          source: "target/*.jar"
          target: "/home/NekasoVM/app/app.jar"

      # 5. Redémarrer le backend sur la VM
      - name: Restart Spring Boot on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: NekasoVM
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            mkdir -p /home/NekasoVM/app
            pkill java || true
            nohup java -jar /home/NekasoVM/app/*.jar > /home/NekasoVM/app/app.log 2>&1 &