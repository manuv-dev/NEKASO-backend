name: Deploy Spring Boot to Azure VM

on:
  push:
    branches: ["develop"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Build Spring Boot
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4. Prepare VM folder
      - name: Create remote folder
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: NekasoVM
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            mkdir -p /home/NekasoVM/app

      # 5. Upload JAR
      - name: Upload JAR to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_IP }}
          username: NekasoVM
          key: ${{ secrets.VM_SSH_KEY }}
          source: "target/nekaso-0.0.1-SNAPSHOT.jar"
          target: "/home/NekasoVM/app/"

      # 6. Deploy, restart & verify backend
      - name: Restart Spring Boot
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: NekasoVM
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            echo "Stopping existing app..."
            pkill -f '[j]ava -jar app.jar' || true
            
            sleep 5
            
            set -e

            echo "Cleaning old jar..."
            rm -f /home/NekasoVM/app/app.jar

            echo "Moving new jar..."
            mv /home/NekasoVM/app/target/nekaso-0.0.1-SNAPSHOT.jar /home/NekasoVM/app/app.jar
            rm -rf /home/NekasoVM/app/target

            echo "Starting application..."
            cd /home/NekasoVM/app
            nohup java -jar app.jar > app.log 2>&1 &

            echo "Waiting for application to respond (Health Check)..."
            success=false
            
            # Boucle de vérification : 12 essais espacés de 5 secondes = 60 secondes max
            for i in {1..12}; do
              # Tente d'accéder à la racine de l'application (ajuster le port 8080 si nécessaire)
              if curl -s --fail http://localhost:8080 > /dev/null; then
                echo "Application lives! Backend started successfully ✔"
                success=true
                break
              fi
              echo "Application not ready yet, retrying in 5 seconds... ($i/12)"
              sleep 5
            done

            # Si après 1 minute l'application ne répond pas, on affiche les logs et on quitte en erreur
            if [ "$success" = false ]; then
              echo "❌ Error: Application failed to start within 60 seconds."
              echo "=== LAST 50 LINES OF APP.LOG ==="
              tail -n 50 app.log
              exit 1
            fi

            echo "Deployment finished successfully ✔"