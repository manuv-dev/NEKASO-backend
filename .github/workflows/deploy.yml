name: Deploy Spring Boot to Azure VM

on:
  push:
    branches: ["develop"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout du code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java pour le build
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Build du JAR
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4. Préparation du dossier distant
      - name: Create remote folder
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: NekasoVM
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            mkdir -p /home/NekasoVM/app

      # 5. Upload du JAR propre
      - name: Upload JAR to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_IP }}
          username: NekasoVM
          key: ${{ secrets.VM_SSH_KEY }}
          source: "target/nekaso-0.0.1-SNAPSHOT.jar"
          target: "/home/NekasoVM/app/"

      # 6. Remplacement du fichier et redémarrage du service de production
      - name: Restart Spring Boot Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: NekasoVM
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            
            echo "Moving new jar..."
            mv /home/NekasoVM/app/target/nekaso-0.0.1-SNAPSHOT.jar /home/NekasoVM/app/app.jar
            rm -rf /home/NekasoVM/app/target

            echo "Restarting Nekaso Service..."
            sudo systemctl restart nekaso.service

            echo "Deployment finished successfully ✔"