name: Deploy Spring Boot to Azure VM

on:
  push:
    branches: ["develop"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Build Spring Boot
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4. Prepare VM folder
      - name: Create remote folder
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: NekasoVM
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            mkdir -p /home/NekasoVM/app

      # 5. Upload JAR
      - name: Upload JAR to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_IP }}
          username: NekasoVM
          key: ${{ secrets.VM_SSH_KEY }}
          source: "target/nekaso-0.0.1-SNAPSHOT.jar"
          target: "/home/NekasoVM/app/"

      # 6. Deploy & restart backend (CORRIGÉ)
      - name: Restart Spring Boot
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: NekasoVM
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            echo "Stopping existing app..."
            # On cible EXCLUSIVEMENT le processus Java avec le nom exact du fichier exécuté
            pkill -f 'java -jar app.jar' || true
            
            # On laisse le temps au processus de se fermer proprement
            sleep 5
            
            # On active le mode strict pour la suite
            set -e

            echo "Cleaning old jar..."
            rm -f /home/NekasoVM/app/app.jar

            echo "Moving new jar..."
            mv /home/NekasoVM/app/target/nekaso-0.0.1-SNAPSHOT.jar /home/NekasoVM/app/app.jar
            
            # Nettoyage du dossier temporaire de l'upload
            rm -rf /home/NekasoVM/app/target

            echo "Starting application..."
            cd /home/NekasoVM/app
            nohup java -jar app.jar > app.log 2>&1 &

            echo "Deployment finished ✔"