name: Deploy Spring Boot to Azure VM

on:
  push:
    branches: ["develop"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Prepare VM folder
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: NekasoVM
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            mkdir -p /home/NekasoVM/app

      - name: Copy JAR to Azure VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_IP }}
          username: NekasoVM
          key: ${{ secrets.VM_SSH_KEY }}
          source: "target/nekaso-0.0.1-SNAPSHOT.jar"
          target: "/home/NekasoVM/app/app.jar"

      - name: Restart Spring Boot on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: NekasoVM
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            pkill java || true
            nohup java -jar /home/NekasoVM/app/app.jar > /home/NekasoVM/app/app.log 2>&1 &